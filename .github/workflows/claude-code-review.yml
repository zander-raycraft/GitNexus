name: Claude Code Review

on:
  # pull_request_target runs in base repo context — secrets are available for both
  # same-repo and fork PRs. The action fetches the correct branch internally.
  pull_request_target:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    # Security guard: pull_request_target runs with repo secrets, so restrict to trusted authors.
    # Skip draft PRs.
    if: |
      github.event.pull_request.draft == false &&
      (
        github.event.pull_request.author_association == 'OWNER' ||
        github.event.pull_request.author_association == 'MEMBER' ||
        github.event.pull_request.author_association == 'COLLABORATOR'
      )

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        # SHA-pinned to luccabb fork for fork PR support (see github.com/anthropics/claude-code-action/issues/963)
        uses: luccabb/claude-code-action@7f39722b8a782471258f32e1d5a9a531b2b68056
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

